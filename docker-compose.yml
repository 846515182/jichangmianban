# ============================================================
# Nexus-Panel Docker Compose 编排（低内存服务器优化版）
# 服务: postgres + redis + panel + frontend
# node-agent 已移除（部署在独立节点服务器）
# 所有容器 restart: no + 内存限制，防止 OOM 循环导致 SSH 失联
# 使用: docker compose --env-file .env up -d
# ============================================================
version: "3.9"

# ---------- 网络定义 ----------
networks:
  nexus-net:
    driver: bridge

# ---------- 数据卷定义 ----------
volumes:
  pg-data:        # PostgreSQL 数据持久化
    driver: local
  redis-data:     # Redis 数据持久化
    driver: local

services:
  # ============================================================
  # PostgreSQL 15 数据库（内存限制 512MB）
  # ============================================================
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: "no"
    environment:
      POSTGRES_USER: ${DB_USER:-nexus}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD 必须在 .env 中设置}
      POSTGRES_DB: ${DB_NAME:-nexus_panel}
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nexus} -d ${DB_NAME:-nexus_panel}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    cpus: "1.0"
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - nexus-net

  # ============================================================
  # Redis 7 缓存（内存限制 256MB）
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: "no"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD 必须在 .env 中设置}
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    cpus: "1.0"
    mem_limit: 256m
    mem_reservation: 128m
    networks:
      - nexus-net

  # ============================================================
  # Nexus-Panel 后端服务（内存限制 512MB）
  # ============================================================
  panel:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nexus-panel:latest
    container_name: nexus-panel
    restart: "no"
    # [S6 fix 2026-07-14] 移除 user:0:0 改用默认非 root 运行
    user: "0:0"  # 以 root 运行，确保能访问 docker.sock 调用宿主机 docker(用于预编译 node-agent)
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
      - "0.0.0.0:50051:50051"
    volumes:
      - ./deployments/tls:/app/tls:ro
      - ./backups:/app/data/backup
      - ./node_agent:/app/node_agent
      # 挂载宿主机 docker，让面板容器能调用宿主机 docker 编译 node-agent 二进制
      # 用于一键部署时在面板服务器预编译，避免低内存节点现场编译 OOM
      # 注意: 挂载宿主机 /usr/bin/docker 在 alpine 容器内无法运行(glibc 不兼容)
      # 所以用静态编译的 docker CLI 放在 /root/nexus-panel/docker-cli/docker
      - /root/nexus-panel:/root/nexus-panel:rw
      # [S6 fix 2026-07-14] 移除 docker.sock 挂载, 降低容器逃逸风险
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: >
      sh -c "mkdir -p /root/.docker/cli-plugins &&
             ln -sf /usr/libexec/docker/cli-plugins/docker-compose /root/.docker/cli-plugins/docker-compose &&
             exec /app/nexus-panel"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    cpus: "1.0"
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - nexus-net

  # ============================================================
  # Nexus-Panel 前端 (Nginx 静态服务 + 反向代理，内存限制 128MB)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: nexus-frontend:latest
    container_name: nexus-frontend
    restart: "no"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/tls:/etc/nginx/certs:ro
      - ./deployments/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      panel:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    cpus: "1.0"
    mem_limit: 128m
    mem_reservation: 64m
    networks:
      - nexus-net
